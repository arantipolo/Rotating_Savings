{% extends "base.html" %}

{% block content %}

<div class="card">
    <h2>Register</h2>
    <form method="POST">
        {{ form.hidden_tag() }}

        <label>{{ form.full_name.label }}</label><br>
        {{ form.full_name(size=32) }}<br><br>

        <label>{{ form.email.label }}</label><br>
        {{ form.email(size=32) }}<br><br>

        <label>{{ form.password.label }}</label><br>
        {{ form.password(size=32) }}<br><br><br>

        <label>{{ form.confirm_password.label }}</label> <br><br>
        {{ form.confirm_password(size=32) }}<br><br>

        {{ form.submit() }}

    </form>
</div>
{% endblock %}
