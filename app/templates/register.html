{% extends "base.html" %}

{% block content %}

<div class="form-header">
    <h2>Register</h2>
</div>

<div class="form-wrapper">
    <form class="form card" method="POST">
        {{ form.hidden_tag() }}

        <div class="field">
            <label>{{ form.full_name.label }}</label>
            {{ form.full_name(size=32) }}
        </div>

        <div class="field">
            <label>{{ form.email.label }}</label>
            {{ form.email(size=32) }}
        </div>

        <div class="field">
            <label>{{ form.password.label }}</label>
            {{ form.password(size=32) }}
        </div>

        <div class="field">
            <label>{{ form.confirm_password.label }}</label>
            {{ form.confirm_password(size=32) }}
        </div>

        <button type="submit" class="btn btn-primary">
            {{ form.submit.label.text if form.submit.label else "Register" }}
        </button>

    </form>
</div>

{% endblock %}
