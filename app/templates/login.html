{% extends "base.html" %}

{% block content %}

<div class="form-header">
    <h2>Login</h2>
</div>

<div class="form-wrapper" style="max-width: 600px;">
    <form class="form-card" method="POST" action="">
        {{ form.hidden_tag() }}

        <div class="field">
            <label class="field-label">{{ form.email.label }}</label>
            {{ form.email(class="field-input", size=32) }}
        </div>

        <div class="field">
            <label class="field-label">{{ form.password.label }}</label>
            {{ form.password(class="field-input", size=32) }}
        </div>

        <div class="field">
            <label class="field-label">
                {{ form.remember.label }}
            </label>
            {{ form.remember() }}
        </div>

        {{ form.submit(class="btn btn-primary") }}
    </form>
</div>

{% endblock %}
