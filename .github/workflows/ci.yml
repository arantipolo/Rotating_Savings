name: CI

# Runs our basic safety checks whenever code is pushed
# This helps catch broken imports, syntax errors, and failing smoke tests
on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

jobs:
  test:
    name: Test Flask app
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Python syntax
        run: python -m compileall config.py run.py app tests

      - name: Run tests
        # Uses python -m pytest so the test runner uses this project's Python path
        # PYTHONPATH lets GitHub Actions import the local app package during CI
        run: python -m pytest
        env:
          PYTHONPATH: ${{ github.workspace }}
